<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HireTrack AI - Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; }
    nav { background: #2563eb; padding: 15px 30px; color: white; display: flex; justify-content: space-between; align-items: center; }
    nav h1 { font-size: 18px; }
    nav div { display: flex; gap: 15px; align-items: center; }
    nav a { color: white; text-decoration: none; font-size: 14px; cursor: pointer; }
    nav button { background: white; color: #2563eb; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 13px; }
    .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
    .stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-bottom: 30px; }
    .stat-card { background: white; padding: 20px; border-radius: 8px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    .stat-card h3 { font-size: 28px; color: #2563eb; }
    .stat-card p { font-size: 13px; color: #666; margin-top: 5px; }
    .section { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); margin-bottom: 20px; }
    .section h2 { margin-bottom: 15px; font-size: 16px; color: #333; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    input, select, textarea { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; }
    textarea { resize: vertical; height: 80px; }
    .btn { padding: 8px 18px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
    .btn-primary { background: #2563eb; color: white; }
    .btn-danger { background: #ef4444; color: white; }
    .btn-success { background: #22c55e; color: white; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: #f9fafb; padding: 10px; text-align: left; border-bottom: 1px solid #e5e7eb; color: #555; }
    td { padding: 10px; border-bottom: 1px solid #f0f0f0; color: #333; }
    tr:hover { background: #fafafa; }
    .badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }
    .badge-applied { background: #dbeafe; color: #1d4ed8; }
    .badge-interview { background: #fef9c3; color: #854d0e; }
    .badge-offer { background: #dcfce7; color: #166534; }
    .badge-rejected { background: #fee2e2; color: #991b1b; }
    .badge-high { background: #fee2e2; color: #991b1b; }
    .badge-medium { background: #fef9c3; color: #854d0e; }
    .badge-low { background: #dcfce7; color: #166534; }
    .filter-row { display: flex; gap: 10px; margin-bottom: 15px; align-items: center; }
    .filter-row select { width: auto; }
    .filter-row input { width: 200px; }
    .msg { padding: 10px; border-radius: 4px; margin-bottom: 10px; font-size: 13px; }
    .msg-success { background: #dcfce7; color: #166534; }
    .msg-error { background: #fee2e2; color: #991b1b; }
  </style>
</head>
<body>

<nav>
  <h1>HireTrack AI</h1>
  <div>
    <span id="user-name" style="font-size:14px;"></span>
    <a href="resume.html">Resume & AI</a>
    <button onclick="logout()">Logout</button>
  </div>
</nav>

<div class="container">

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card"><h3 id="total">0</h3><p>Total Applied</p></div>
    <div class="stat-card"><h3 id="applied">0</h3><p>Applied</p></div>
    <div class="stat-card"><h3 id="interviews">0</h3><p>Interviews</p></div>
    <div class="stat-card"><h3 id="offers">0</h3><p>Offers</p></div>
    <div class="stat-card"><h3 id="rejections">0</h3><p>Rejected</p></div>
  </div>

  <!-- Add Application -->
  <div class="section">
    <h2>Add New Application</h2>
    <div id="form-msg"></div>
    <div class="form-row">
      <input type="text" id="company" placeholder="Company Name" />
      <input type="text" id="role" placeholder="Job Role" />
    </div>
    <div class="form-row">
      <input type="text" id="job_url" placeholder="Job URL (optional)" />
      <input type="text" id="notes" placeholder="Notes (optional)" />
    </div>
    <textarea id="job_description" placeholder="Paste Job Description here..."></textarea>
    <br><br>
    <button class="btn btn-primary" onclick="addApplication()">Add Application</button>
  </div>

  <!-- Applications List -->
  <div class="section">
    <h2>My Applications</h2>
    <div class="filter-row">
      <span style="font-size:13px;color:#555;">Filter:</span>
      <select id="filter-status" onchange="loadApplications()">
        <option value="">All</option>
        <option value="Applied">Applied</option>
        <option value="Interview">Interview</option>
        <option value="Offer">Offer</option>
        <option value="Rejected">Rejected</option>
      </select>
      <button class="btn btn-primary" onclick="loadApplications()">Refresh</button>
    </div>
    <table>
      <thead>
        <tr>
          <th>Company</th>
          <th>Role</th>
          <th>Status</th>
          <th>Date Applied</th>
          <th>Notes</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="applications-table"></tbody>
    </table>
  </div>

</div>

<script>
  const API = "http://localhost:8000";
  const token = localStorage.getItem("token");

  if (!token) window.location.href = "login.html";

  function headers() {
    return { "Content-Type": "application/json", "Authorization": `Bearer ${token}` };
  }

  function logout() {
    localStorage.removeItem("token");
    window.location.href = "login.html";
  }

  function badgeStatus(status) {
    const map = { Applied: "badge-applied", Interview: "badge-interview", Offer: "badge-offer", Rejected: "badge-rejected" };
    return `<span class="badge ${map[status] || ''}">${status}</span>`;
  }

  async function loadProfile() {
    const res = await fetch(`${API}/auth/me`, { headers: headers() });
    const data = await res.json();
    if (res.ok) document.getElementById("user-name").innerText = `Hi, ${data.name}`;
    else { localStorage.removeItem("token"); window.location.href = "login.html"; }
  }

  async function loadStats() {
    const res = await fetch(`${API}/dashboard/stats`, { headers: headers() });
    const data = await res.json();
    if (res.ok) {
      document.getElementById("total").innerText = data.total_applications;
      document.getElementById("applied").innerText = data.applied;
      document.getElementById("interviews").innerText = data.interviews;
      document.getElementById("offers").innerText = data.offers;
      document.getElementById("rejections").innerText = data.rejections;
    }
  }

  async function loadApplications() {
    const status = document.getElementById("filter-status").value;
    const url = status ? `${API}/applications/filter?status=${status}` : `${API}/applications/`;
    const res = await fetch(url, { headers: headers() });
    const data = await res.json();
    const tbody = document.getElementById("applications-table");
    tbody.innerHTML = "";
    if (!res.ok || data.length === 0) {
      tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:#999;padding:20px;">No applications found</td></tr>`;
      return;
    }
    data.forEach(app => {
      tbody.innerHTML += `
        <tr>
          <td>${app.company}</td>
          <td>${app.role}</td>
          <td>${badgeStatus(app.status)}</td>
          <td>${new Date(app.date_applied).toLocaleDateString()}</td>
          <td>${app.notes || "-"}</td>
          <td style="display:flex;gap:5px;">
            <select onchange="updateStatus(${app.id}, this.value)" style="padding:4px;font-size:12px;border:1px solid #ddd;border-radius:4px;">
              <option value="">Update</option>
              <option value="Applied">Applied</option>
              <option value="Interview">Interview</option>
              <option value="Offer">Offer</option>
              <option value="Rejected">Rejected</option>
            </select>
            <button class="btn btn-danger" onclick="deleteApplication(${app.id})">Delete</button>
          </td>
        </tr>`;
    });
  }

  async function addApplication() {
    const company = document.getElementById("company").value;
    const role = document.getElementById("role").value;
    const job_description = document.getElementById("job_description").value;
    const job_url = document.getElementById("job_url").value;
    const notes = document.getElementById("notes").value;
    const msg = document.getElementById("form-msg");

    if (!company || !role) {
      msg.innerHTML = `<div class="msg msg-error">Company and Role are required</div>`;
      return;
    }

    const res = await fetch(`${API}/applications/`, {
      method: "POST",
      headers: headers(),
      body: JSON.stringify({ company, role, job_description, job_url, notes })
    });

    if (res.ok) {
      msg.innerHTML = `<div class="msg msg-success">Application added successfully</div>`;
      document.getElementById("company").value = "";
      document.getElementById("role").value = "";
      document.getElementById("job_description").value = "";
      document.getElementById("job_url").value = "";
      document.getElementById("notes").value = "";
      loadApplications();
      loadStats();
    } else {
      msg.innerHTML = `<div class="msg msg-error">Something went wrong</div>`;
    }
  }

  async function updateStatus(id, status) {
    if (!status) return;
    await fetch(`${API}/applications/${id}`, {
      method: "PUT",
      headers: headers(),
      body: JSON.stringify({ status })
    });
    loadApplications();
    loadStats();
  }

  async function deleteApplication(id) {
    if (!confirm("Delete this application?")) return;
    await fetch(`${API}/applications/${id}`, { method: "DELETE", headers: headers() });
    loadApplications();
    loadStats();
  }

  loadProfile();
  loadStats();
  loadApplications();
</script>
</body>
</html>
